xboard:
  # 后端提供商类型
  # 必须与 remote.config.json 中的 panels 键名一致（例如: mihomo）
  provider: mihomo
  
  # 远程配置源
  remote_config:
    sources:
      # 主配置源（重定向服务）
      - name: redirect
        url: https://api01.dogssr.com/config.json
        priority: 100
      
  # 应用信息
  app:
    title: Dogssr
    website: dogssr.com
  
  # 订阅配置
  subscription:
    prefer_encrypt: false 
